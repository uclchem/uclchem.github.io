# Multi-version documentation configuration
# This file defines which versions to build and their properties
#
# "main" is a stable alias that always mirrors the latest point release.
# External links to /main/ remain valid across releases — only git_ref needs
# updating here when a new stable version is cut.

versions:
  - git_ref: v4.0.0
    version_name: main
    display_name: main (latest stable)
    url_path: /main/
    preferred: true
    execute: false
    description: Latest stable release (currently v4.0.0) — stable URL alias

  - git_ref: v3.5.5
    version_name: v3.5.5
    display_name: v3.5.5
    url_path: /v3.5.5/
    preferred: false
    execute: false
    description: Stable release v3.5.5

  - git_ref: v4.0.0
    version_name: v4.0.0
    display_name: v4.0.0
    url_path: /v4.0.0/
    preferred: false
    execute: false
    description: Stable release v4.0.0

  - git_ref: develop
    version_name: develop
    display_name: Development
    url_path: /develop/
    preferred: false
    execute: false
    description: Latest development version with cutting-edge features

# Build configuration
build:
  # Default redirect target (usually the preferred/stable version)
  default_version: main

  # Sphinx build options
  sphinx:
    builder: html
    parallel: auto
    
  # Notebook handling
  notebooks:
    execute: false  # Set to true to execute notebooks during build
    timeout: 7200
    
  # Logging
  logs:
    save_install: true
    save_build: true
    directory: logs
